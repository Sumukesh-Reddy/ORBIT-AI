<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" fill="none">
  <defs>
    <linearGradient id="orbit-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
  </defs>
  <!-- Orbit Ring 1 -->
  <ellipse cx="16" cy="16" rx="13" ry="5" transform="rotate(-30 16 16)" stroke="url(#orbit-grad)" stroke-width="2" opacity="0.8" />
  <!-- Orbit Ring 2 -->
  <ellipse cx="16" cy="16" rx="13" ry="5" transform="rotate(30 16 16)" stroke="url(#orbit-grad)" stroke-width="2" opacity="0.8" />
  <!-- Orbit Ring 3 (dashed background ring) -->
  <circle cx="16" cy="16" r="13" stroke="url(#orbit-grad)" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.5" />
  <!-- Central Nucleus -->
  <circle cx="16" cy="16" r="5" fill="url(#orbit-grad)" />
  <!-- Orbiting Node -->
  <circle cx="25" cy="11" r="2.2" fill="#60a5fa" />
</svg>